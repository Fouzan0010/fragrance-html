<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Address</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

<style>

body{
    font-family:Arial, sans-serif;
    background:#f5f5f5;
}

/* Navbar */

.navbar{
    box-shadow:0 2px 10px rgba(0,0,0,.1);
    padding:15px 0;
}

.logo{
    font-size:35px;
    font-weight:bold;
    color:#073B52;
}


.search-box{
    position:relative;
    width:250px;
}

.search-box i{
    position:absolute;
    left:15px;
    top:50%;
    transform:translateY(-50%);
    color:gray;
}

.search-box input{
    padding-left:40px;
    border-radius:30px;
}


.icon-btn{

    width:45px;
    height:45px;
    border:1px solid #ddd;
    border-radius:50%;
    display:flex;
    justify-content:center;
    align-items:center;
    margin-left:10px;
}


.icon-btn a{
    color:black;
    text-decoration:none;
}


.profile{
    background:#073B52;
}


.profile a{
    color:white;
}


/* Address */

.address-card{

    max-width:1100px;
    margin:50px auto;
    background:white;
    padding:35px;
    border-radius:15px;
    box-shadow:0 10px 30px rgba(0,0,0,.15);

}


.address-btn{

    width:150px;
    height:50px;
    border-radius:8px;
    background:#eee;
    font-weight:600;

}


.address-btn.active{

    background:#073B52;
    color:white;

}


.form-control{

    height:50px;
    border-radius:8px;

}


textarea.form-control{

    height:100px;
    resize:none;

}



.edit-btn{

    width:150px;
    height:50px;
    border:none;
    border-radius:8px;
    background:#0a7ab7;
    color:white;
    font-weight:600;

}


.edit-btn:hover{

    background:#075d8a;

}


</style>

</head>

<body>


<!-- Navbar -->

<nav class="navbar navbar-expand-lg bg-white">

<div class="container">


<a class="navbar-brand logo" href="#">
Fragranzia
</a>


<button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#menu">

<span class="navbar-toggler-icon"></span>

</button>



<div class="collapse navbar-collapse" id="menu">


<ul class="navbar-nav mx-auto">


<li class="nav-item">
<a style="margin-left: 400px;" class="nav-link" href="#">Home</a>
</li>


<li class="nav-item">
<a class="nav-link" href="#">Products</a>
</li>


<li class="nav-item">
<a class="nav-link" href="#">Gifting</a>
</li>


<li class="nav-item">
<a class="nav-link" href="#">About</a>
</li>


</ul>




<div class="d-flex align-items-center">


<div class="search-box me-2">

<i class="bi bi-search"></i>

<input type="text" class="form-control" placeholder="Search Here">

</div>



<div class="icon-btn">
<a href="#"><i class="bi bi-cart3"></i></a>
</div>


<div class="icon-btn">
<a href="#"><i class="bi bi-bell"></i></a>
</div>


<div class="icon-btn profile">
<a href="#"><i class="bi bi-person"></i></a>
</div>



</div>


</div>

</div>

</nav>



<!-- Address Section -->


<div class="container">


<div class="address-card">


<h3 class="fw-bold mb-4">
Address Type
</h3>



<div class="d-flex gap-3 mb-4">


<button class="btn address-btn active">

<i class="bi bi-house"></i>
Home

</button>



<button class="btn address-btn">

<i class="bi bi-building"></i>
Office

</button>



<button class="btn address-btn">

<i class="bi bi-geo-alt"></i>
Other

</button>


</div>




<form id="addressForm">



<div class="row">


<div class="col-md-4 mb-3">

<label class="form-label">
Full Name
</label>

<input type="text" class="form-control" value="Fouzan Ahmed" disabled>

</div>



<div class="col-md-4 mb-3">

<label class="form-label">
Phone Number
</label>

<input type="text" class="form-control" value="9876543210" disabled>

</div>


</div>





<div class="mb-3">

<label class="form-label">
Address
</label>

<textarea class="form-control" disabled>
ABC House, Main Road, Kochi
</textarea>

</div>






<div class="row">


<div class="col-md-4 mb-3">

<label class="form-label">
City/District
</label>

<input type="text" class="form-control" value="Ernakulam" disabled>

</div>




<div class="col-md-4 mb-3">

<label class="form-label">
State
</label>

<input type="text" class="form-control" value="Kerala" disabled>

</div>




<div class="col-md-4 mb-3">

<label class="form-label">
Land Mark
</label>

<input type="text" class="form-control" value="Near Bus Stand" disabled>

</div>


</div>






<div class="row">


<div class="col-md-4 mb-3">

<label class="form-label">
Pin Code
</label>

<input type="text" class="form-control" value="682001" disabled>

</div>




<div class="col-md-4 mb-3">

<label class="form-label">
Alternative Phone
</label>

<input type="text" class="form-control" value="9999999999" disabled>

</div>


</div>






<div class="text-end mt-4">


<button type="button" id="editBtn" class="btn edit-btn">

<i class="bi bi-pencil-square"></i>
Edit

</button>


</div>




</form>


</div>

</div>





<script>

const btn=document.getElementById("editBtn");

const fields=document.querySelectorAll("#addressForm input,#addressForm textarea");


let editing=false;



btn.addEventListener("click",()=>{


editing=!editing;


fields.forEach(field=>{

field.disabled=!editing;

});



if(editing){


btn.innerHTML='<i class="bi bi-check-circle"></i> Update';


}

else{


btn.innerHTML='<i class="bi bi-pencil-square"></i> Edit';


alert("Address Updated Successfully!");

}


});


</script>



<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>


</body>
</html>
