<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Form</title>

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            font-family: Arial, Helvetica, sans-serif;
        }

        .x img{
            margin-top:50px;
            margin-left:20px;
        }

        .main{
            display:flex;
            gap:20px;
            margin-left:600px;
            margin-top:-400px;
        }

        .divider{
            display:flex;
            align-items:center;
            width:330px;
            margin-left:600px;
            margin-top:20px;
        }

        .divider::before,
        .divider::after{
            content:"";
            flex:1;
            border-bottom:1px solid #ccc;
        }

        .divider span{
            padding:0 10px;
            color:#666;
            font-size:14px;
        }

        .input-box{
            position:relative;
            width:330px;
            margin:10px 0;
            margin-left:600px;
        }

        .input-box i{
            position:absolute;
            left:12px;
            top:50%;
            transform:translateY(-50%);
            color:gray;
        }

        .input-box input{
            width:100%;
            padding:10px 10px 10px 40px;
            border:1px solid #ccc;
            border-radius:5px;
            font-size:16px;
        }

        .login-btn{
            width:330px;
            height:42px;
            margin-left:600px;
            margin-top:10px;
            background:rgb(0,117,88);
            color:white;
            border:none;
            border-radius:5px;
            cursor:pointer;
        }

        .login-btn:hover{
            background:#00664d;
        }

        .forgot{
            margin-left:810px;
            margin-top:10px;
        }

        .signup{
            margin-left:630px;
            margin-top:10px;
        }
    </style>
</head>

<body>

    <!-- Image -->
    <div class="x">
        <img src="Frame 184.png" alt="Image" width="500" height="500">
    </div>

    <!-- Google & Facebook Buttons -->
    <div class="main">

      <a href="https://www.google.com/" class="text-decoration-none">
    <button class="btn btn-outline-dark" style="width:150px;">
        <i class="fa-brands fa-google me-2"></i>Google
    </button>
</a>
            <button class="btn btn-outline-primary" style="width:150px;">
                <i class="fa-brands fa-facebook me-2"></i>Facebook
            </button>
        </a>

    </div>

    <!-- Divider -->
    <div class="divider">
        <span>Or sign up with email</span>
    </div>

    <!-- Username -->
    <div class="input-box">
        <i class="fa-regular fa-circle-user"></i>
        <input type="text" id="username" placeholder="Enter your username">
    </div>

    <!-- Password -->
    <div class="input-box">
        <i class="fa-solid fa-lock"></i>
        <input type="password" id="password" placeholder="Enter your password">
    </div>

    <!-- Forgot Password -->
    <div class="forgot">
        <a href="https://support.google.com/accounts/answer/41078?hl=en&co=GENIE.Platform%3DDesktop">
            Forgot Password?
        </a>
    </div>

    <!-- Login Button -->
    <button class="login-btn" onclick="validateForm()">
        Log In
    </button>

    <!-- Sign Up -->
    <p class="signup">
        Don't have an account?
        <a href="https://support.google.com/mail/answer/56256?hl=en">Sign Up</a>
    </p>

    <!-- JavaScript Validation -->
    <script>
        function validateForm() {

            let username = document.getElementById("username").value.trim();
            let password = document.getElementById("password").value.trim();

            if (username === "") {
                alert("Please enter your username.");
                return false;
            }

            if (password === "") {
                alert("Please enter your password.");
                return false;
            }

            // Demo Login
            if (username === "admin" && password === "12345") {
                alert("Login Successful!");
            } else {
                alert("Invalid Username or Password!");
            }
        }
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
