<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <style>
        body {
            font-family: "Segoe UI", sans-serif;
            background: #f8f9fa;
        }

        .navbar {
            box-shadow: 0 2px 10px rgba(0, 0, 0, .08);
        }

        .logo {
            font-size: 35px;
            font-weight: bold;
            color: #083d56;
        }

        .search-box {
            position: relative;
            width: 260px;
        }

        .search-box i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
        }

        .search-box input {
            padding-left: 40px;
            border-radius: 30px;
        }

        .icon-circle {
            width: 45px;
            height: 45px;
            border: 1px solid #ccc;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-left: 10px;
        }

        .icon-circle a {
            color: black;
            text-decoration: none;
            font-size: 20px;
        }

        .profile-icon {
            background: #083d56;
        }

        .profile-icon a {
            color: white;
        }

        .tab-active {
            background: #083d56;
            color: white;
        }

        .card {
            border: none;
            border-radius: 15px;
        }

        .eye {
            position: absolute;
            right: 15px;
            top: 12px;
            cursor: pointer;
            font-size: 20px;
        }
    </style>
</head>

<body>

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg bg-white">
        <div class="container">

            <a class="navbar-brand logo" href="#">Fragranzia</a>

            <div class="collapse navbar-collapse show">

                <ul class="navbar-nav mx-auto">
                    <li class="nav-item"><a style="margin-left: 400px;" class="nav-link active" href="#">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="#">Products</a></li>
                    <li class="nav-item"><a class="nav-link" href="#">Gifting</a></li>
                    <li class="nav-item"><a class="nav-link" href="#">About</a></li>
                </ul>

                <div class="d-flex align-items-center">

                    <div class="search-box">
                        <i class="bi bi-search"></i>
                        <input type="text" class="form-control" placeholder="Search Here">
                    </div>

                    <div class="icon-circle">
                        <a href="#"><i class="bi bi-cart3"></i></a>
                    </div>

                    <div class="icon-circle">
                        <a href="#"><i class="bi bi-bell"></i></a>
                    </div>

                    <div class="icon-circle profile-icon">
                        <a href="#"><i class="bi bi-person"></i></a>
                    </div>

                </div>

            </div>

        </div>
    </nav>

    <!-- Profile -->
    <div class="container py-5">

        <h1 class="fw-bold display-5 mb-4">Profile</h1>

        <div class="mb-4">
            <button class="btn tab-active">Profile</button>
            <button class="btn btn-outline-secondary">Address</button>
            <button class="btn btn-outline-secondary">My Orders</button>
        </div>

        <div class="card shadow-sm p-4">

            <div class="row g-4">

                <div class="col-md-4">
                    <label class="form-label">Full Name</label>
                    <input type="text" class="form-control" value="Thomas">
                </div>

                <div class="col-md-4">
                    <label class="form-label">Email</label>
                    <input type="email" class="form-control" value="thomas12@gmail.com">
                </div>

                <div class="col-md-4">
                    <label class="form-label">Phone</label>
                    <input type="text" class="form-control" value="+91 98765 43210">
                </div>

                <div class="col-md-4">
                    <label class="form-label">Date of Birth</label>
                    <input type="date" class="form-control" value="1998-05-15">
                </div>

                <div class="col-md-4">
                    <label class="form-label">Gender</label>

                    <select class="form-select">
                        <option selected>Male</option>
                        <option>Female</option>
                        <option>Other</option>
                    </select>
                </div>

                <div class="col-md-4">

                    <label class="form-label">Password</label>

                    <div class="position-relative">
                        <input type="password" id="password" class="form-control" value="12345678">
                        <i class="bi bi-eye-slash eye" id="togglePassword"></i>
                    </div>

                </div>

            </div>

            <!-- Save Button -->
            <div class="text-end mt-4">
                <button class="btn btn-primary px-4" onclick="saveProfile()">
                    <i class="bi bi-check-circle-fill"></i> Save
                </button>
            </div>

        </div>

    </div>

    <script>
        const password = document.getElementById("password");
        const togglePassword = document.getElementById("togglePassword");

        togglePassword.onclick = function () {

            if (password.type === "password") {
                password.type = "text";
                togglePassword.classList.remove("bi-eye-slash");
                togglePassword.classList.add("bi-eye");
            } else {
                password.type = "password";
                togglePassword.classList.remove("bi-eye");
                togglePassword.classList.add("bi-eye-slash");
            }

        };

        function saveProfile() {
            alert("Profile saved successfully!");
        }
    </script>

</body>

</html>
