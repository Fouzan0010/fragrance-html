<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Signup</title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Font Awesome -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">


<style>

.input-box{
    position:relative;
    margin-bottom:15px;
}

.input-box i{
    position:absolute;
    left:15px;
    top:50%;
    transform:translateY(-50%);
    color:#666;
}

.input-box input{
    width:330px;
    height:45px;
    padding-left:45px;
    border:1px solid #ccc;
    border-radius:5px;
}


.divider{
    display:flex;
    align-items:center;
    width:330px;
    margin:20px 0;
}

.divider:before,
.divider:after{
    content:"";
    flex:1;
    border-bottom:1px solid #ccc;
}

.divider span{
    padding:0 10px;
}


.signup-img{
    width:450px;
    height:500px;
    border-radius:90px;
}


.signup-btn{
    width:330px;
    height:40px;
    background:#026144;
    color:white;
    border:none;
    border-radius:5px;
}

.signup-btn:hover{
    background:#014d35;
}


</style>


</head>


<body>


<div class="container mt-5">


<div class="row align-items-center">


<!-- Image -->

<div class="col-md-6 text-center">

<div ><img style="width: 500px;" src="image .w.png" alt=""></div>





<!-- Signup Form -->

<div style="margin-left: 700px; margin-top: -480px;" class="col-md-6">


<!-- Social Buttons -->

<div class="d-flex gap-3 mb-3">


<a href="https://www.google.com/" target="_blank">

<button class="btn btn-outline-dark" style="width:150px;">

<i class="fa-brands fa-google me-2"></i>
Google

</button>

</a>



<a href="https://www.facebook.com/" target="_blank">

<button class="btn btn-outline-primary" style="width:150px;">

<i class="fa-brands fa-facebook me-2"></i>
Facebook

</button>

</a>


</div>




<!-- Divider -->

<div class="divider">

<span>
Or sign up with email
</span>

</div>





<!-- Username -->

<div class="input-box">

<i class="fa-regular fa-circle-user"></i>

<input id="username" 
class="form-control"
type="text"
placeholder="Enter your username">

</div>




<!-- Email -->

<div class="input-box">

<i class="fa-regular fa-envelope"></i>

<input id="email"
class="form-control"
type="email"
placeholder="Enter your email">

</div>




<!-- Password -->

<div class="input-box">

<i class="fa-solid fa-lock"></i>

<input id="password"
class="form-control"
type="password"
placeholder="Enter your password">

</div>




<!-- Confirm Password -->

<div class="input-box">

<i class="fa-solid fa-lock"></i>

<input id="confirmPassword"
class="form-control"
type="password"
placeholder="Confirm your password">

</div>




<input type="checkbox" id="terms">

<label>

Agree with 

<a onclick="alert('hello')" href="https://support.google.com/?hl=en">
Terms and Conditions
</a>

</label>


<br>



<button onclick="validateForm()" 
class="signup-btn mt-3">

Sign Up

</button>




<p class="mt-3">

Already have an account?

<a href="https://myaccount.google.com/?utm_source=sign_in_no_continue&pli=1">
Sign up
</a>

</p>



</div>


</div>


</div>






<script>


function validateForm(){


let u=document.getElementById("username").value.trim();

let e=document.getElementById("email").value.trim();

let p=document.getElementById("password").value;

let c=document.getElementById("confirmPassword").value;

let t=document.getElementById("terms");



if(u.length<3){

alert("Username must be at least 3 characters.");

return;

}



if(!e.includes("@") || !e.includes(".")){

alert("Enter a valid email.");

return;

}



if(p.length<6){

alert("Password must be at least 6 characters.");

return;

}



if(p!==c){

alert("Passwords do not match.");

return;

}



if(!t.checked){

alert("Please agree to Terms and Conditions.");

return;

}



alert("Registration Successful!");

window.location.href="login.html";


}


</script>


</body>
</html>
