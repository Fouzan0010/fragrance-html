<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Address Form</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

<style>

body{
    background:#f6f6f6;
    font-family:Arial, Helvetica, sans-serif;
}

/* Navbar */

.navbar{
    background:#fff;
    box-shadow:0 2px 10px rgba(0,0,0,.1);
    padding:18px 0;
}

.logo{
    font-size:38px;
    font-weight:bold;
    color:#063b54;
}

.nav-link{
    color:#222;
    font-size:20px;
    margin:0 12px;
}

.search-box{
    position:relative;
    width:280px;
}

.search-box i{
    position:absolute;
    left:18px;
    top:50%;
    transform:translateY(-50%);
    color:gray;
    font-size:18px;
}

.search-box input{
    border-radius:30px;
    height:48px;
    padding-left:45px;
}

.icon-btn{
    width:48px;
    height:48px;
    border:1px solid #ddd;
    border-radius:50%;
    display:flex;
    justify-content:center;
    align-items:center;
    margin-left:12px;
    background:#fff;
}

.icon-btn i{
    font-size:22px;
    color:#000;
}

.profile{
    background:#063b54;
}

.profile i{
    color:#fff;
}

/* Form Card */

.address-card{
    background:#fff;
    max-width:1150px;
    margin:60px auto;
    padding:35px;
    border-radius:15px;
    box-shadow:0 10px 30px rgba(0,0,0,.15);
}

label{
    font-weight:600;
    margin-bottom:8px;
}

.form-control{
    height:54px;
    border-radius:10px;
}

textarea.form-control{
    height:110px;
    resize:none;
}

.address-btn{
    width:150px;
    height:50px;
    border:none;
    border-radius:8px;
    background:#efebeb;
    font-weight:600;
}

.address-btn.active{
    background:#063b54;
    color:#fff;
}

.save-btn{
    width:150px;
    height:50px;
    border:none;
    border-radius:8px;
    background:#0a7ab7;
    color:#fff;
    font-size:18px;
    font-weight:600;
}

.save-btn:hover{
    background:#06618f;
}

</style>

</head>

<body>

<!-- Navbar -->

<nav class="navbar navbar-expand-lg">

<div class="container">

<a class="navbar-brand logo" href="#">Fragranzia</a>

<button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#menu">
<span class="navbar-toggler-icon"></span>
</button>

<div class="collapse navbar-collapse" id="menu">

<ul class="navbar-nav mx-auto">

<li class="nav-item">
<a style="margin-left: 400px;" class="nav-link" href="#">Home</a>
</li>

<li class="nav-item">
<a class="nav-link" href="#">Products</a>
</li>

<li class="nav-item">
<a class="nav-link" href="#">Gifting</a>
</li>

<li class="nav-item">
<a class="nav-link" href="#">About</a>
</li>

</ul>

<div class="d-flex align-items-center">

<div class="search-box">
<i class="bi bi-search"></i>
<input type="text" class="form-control" placeholder="Search Here">
</div>

<div class="icon-btn">
<i class="bi bi-cart3"></i>
</div>

<div class="icon-btn">
<i class="bi bi-bell"></i>
</div>

<div class="icon-btn profile">
<i class="bi bi-person"></i>
</div>

</div>

</div>

</div>

</nav>

<!-- Address Form -->

<div class="container">

<div class="address-card">

<h3 class="fw-bold mb-4">Address Type</h3>

<div class="d-flex gap-3 mb-4">

<button class="btn address-btn active">
<i class="bi bi-house"></i> Home
</button>

<button class="btn address-btn">
<i class="bi bi-building"></i> Office
</button>

<button class="btn address-btn">
<i class="bi bi-geo-alt"></i> Other
</button>

</div>

<form>

<div class="row">

<div class="col-md-4 mb-3">
<label>Full Name</label>
<input type="text" class="form-control" placeholder="Enter full name">
</div>

<div class="col-md-4 mb-3">
<label>Phone Number</label>
<input type="text" class="form-control" placeholder="Enter 10-digit mobile number">
</div>

</div>

<div class="mb-3">
<label>Address</label>
<textarea class="form-control" placeholder="Enter house or building details"></textarea>
</div>

<div class="row">

<div class="col-md-4 mb-3">
<label>City/District</label>
<input type="text" class="form-control" placeholder="Enter City/District">
</div>

<div class="col-md-4 mb-3">
<label>State</label>
<input type="text" class="form-control" placeholder="Enter State">
</div>

<div class="col-md-4 mb-3">
<label>Land Mark</label>
<input type="text" class="form-control" placeholder="Enter Landmark">
</div>

</div>

<div class="row">

<div class="col-md-4 mb-3">
<label>PinCode</label>
<input type="text" class="form-control" placeholder="Enter Pincode">
</div>

<div class="col-md-4 mb-3">
<label>Alternative Phone Number (Optional)</label>
<input type="text" class="form-control" placeholder="Enter Alternative Number">
</div>

</div>

<div class="text-end mt-3">

<button class="save-btn" type="submit">
Save
</button>

</div>

</form>

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
