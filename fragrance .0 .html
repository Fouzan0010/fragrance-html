<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Signup</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
<style>
.main
{display:flex;gap:20px;margin-left:600px;margin-top:-450px}
.x{margin-left:600px;margin-top:10px}
.input-box{position:relative;width:330px;margin:10px 0}
.input-box i{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:#666}
.input-box input{width:100%;padding:10px 10px 10px 40px;border:1px solid #ccc;border-radius:5px}
.divider{display:flex;align-items:center;width:330px;margin:20px 0}
.divider:before,.divider:after{content:"";flex:1;border-bottom:1px solid #ccc}
.divider span{padding:0 10px;color:#0f0f0f}
.y img{margin-left:100px;margin-top:50px;border-radius:90px}
</style></head>
<body>
<div class="y"><img src="image .w.png" width="450" height="500" alt=""></div>
<div class="main">
<a href="https://www.google.com/" class="text-decoration-none">
    <button class="btn btn-outline-dark" style="width:150px;">
        <i class="fa-brands fa-google me-2"></i>Google
    </button>
</a>
            <button class="btn btn-outline-primary" style="width:150px;">
                <i class="fa-brands fa-facebook me-2"></i>Facebook
            </button>
        </a>
</div>
<div class="x">
<div  class="divider"><a href="https://mail.google.com/" ><span>Or sign up with email</span></a></div>
<div class="input-box"><i class="fa-regular fa-circle-user"></i><input id="username" type="text" placeholder="Enter your username"></div>
<div class="input-box"><i class="fa-regular fa-envelope"></i><input id="email" type="email" placeholder="Enter your email"></div>
<div class="input-box"><i class="fa-solid fa-lock"></i><input id="password" type="password" placeholder="Enter your password"></div>
<div class="input-box"><i class="fa-solid fa-lock"></i><input id="confirmPassword" type="password" placeholder="Confirm your password"></div>
<input type="checkbox" id="terms">
<label for="terms">Agree with <a href="#">Terms and Conditions</a></label><br>
<button onclick="validateForm()" style="width:330px;height:40px;background:#026144;color:bisque;margin-top:10px">Sign Up</button>
<p style="margin-top:10px;margin-left:30px">Already have an account? <a href="https://support.google.com/mail/answer/56256?hl=en">Sign up</a></p>
</div>
<script>
function validateForm(){
let u=username.value.trim(),e=email.value.trim(),p=password.value,c=confirmPassword.value;
if(u.length<3){alert("Username must be at least 3 characters.");return;}
if(!e.includes("@")||!e.includes(".")){alert("Enter a valid email.");return;}
if(p.length<6){alert("Password must be at least 6 characters.");return;}
if(p!==c){alert("Passwords do not match.");return;}
if(!terms.checked){alert("Please agree to the Terms and Conditions.");return;}
alert("Registration Successful!");
window.location.href="login.html";
}
</script></body></html>
