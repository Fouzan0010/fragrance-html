<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Fragranzia</title>

<!-- Bootstrap CSS -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Bootstrap Icons -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

<style>

body{
    font-family: Arial, sans-serif;
}

/* Logo */
.logo{
    color: rgb(3,85,85);
    font-weight: bold;
}

/* Search box */
.search-box{
    position: relative;
    width:220px;
}

.search-box i{
    position:absolute;
    left:15px;
    top:50%;
    transform:translateY(-50%);
    color:gray;
    cursor:pointer;
}

.search-box input{
    width:100%;
    height:38px;
    border:1px solid #ccc;
    border-radius:30px;
    padding-left:40px;
    outline:none;
}

/* Icons */
.nav-icon{
    font-size:22px;
    color:#222;
}

/* Address buttons */
.address-btn{
    border:1px solid #ddd;
    border-radius:25px;
    padding:10px 25px;
    background:white;
}

.address-btn:hover,
.address-btn.active{
    background:#035555;
    color:white;
}

</style>

</head>

<body>


<!-- Navbar -->

<nav class="navbar navbar-expand-lg bg-white shadow-sm">

<div class="container-fluid">


<!-- Logo -->
<a class="navbar-brand logo ms-3" href="#">
    Fragranzia
</a>


<!-- Menu -->

<ul class="navbar-nav ms-auto align-items-center gap-4">


<li class="nav-item">
<a href="index.html" class="nav-link text-dark">
Home
</a>
</li>


<li class="nav-item">

</a>
</li>


<li class="nav-item">

</a>
</li>


<li class="nav-item">

About
</a>
</li>


<!-- Search -->

<li>

<div class="search-box">

<input type="text" id="search" list="suggestions" placeholder="Search Here">

<i class="bi bi-search" onclick="searchItem()"></i>

</div>


<datalist id="suggestions">

<option value="Kyros Spray">
<option value="Royal">
<option value="Autographic">
<option value="Kyros Deodorizing Spray">

</datalist>


</li>



<!-- Cart -->

<li>
<a href="cart.html">
<i class="bi bi-cart nav-icon"></i>
</a>

<!-- Notification -->

<a href="#">

<li>
<a href="profile.html">

</a>
</li>


</ul>

</div>

</nav>

<div class="container mt-5">


<h3 class="mb-4">
Select Address Type
</h3>


<div class="d-flex gap-3">


<button class="btn address-btn active">


Profile

</button>


<button class="btn address-btn">

Address

</button>


<button class="btn address-btn">


MY Order

</button>


</div>


</div>




<script>

function searchItem(){

let text=document.getElementById("search").value.trim();


if(text==""){

alert("Please enter something to search.");

}

else{

alert("Searching for : "+text);

}

}


</script>


<!-- Bootstrap JS -->
