<!DOCTYPE html>
<html lang="en">
<head>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
    font-family:Arial, sans-serif;
    background:#fff;
}

/* Navbar */
.navbar{
    box-shadow:0 2px 10px rgba(0,0,0,.1);
    padding:15px 0;
}

.logo{
    font-size:35px;
    font-weight:bold;
    color:#073B52;
}

.search-box{
    position:relative;
    width:250px;
}

.search-box i{
    position:absolute;
    left:15px;
    top:50%;
    transform:translateY(-50%);
    color:gray;
}

.search-box input{
    padding-left:40px;
    border-radius:30px;
}

.icon-btn{
    width:45px;
    height:45px;
    border:1px solid #ddd;
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;
    margin-left:10px;
}

.icon-btn a{
    color:#000;
    text-decoration:none;
}

.profile{
    background:#073B52;
}

.profile a{
    color:#fff;
}

/* Tabs */
.tab-btn{
    width:180px;
    height:55px;
    border:1px solid #ddd;
    font-size:22px;
}

.active-tab{
    background:#073B52;
    color:#fff;
}

/* Address Card */
.address-card{
    border:1px solid #ddd;
    border-radius:10px;
}

.office{
    background:#073B52;
    color:#fff;
    border-radius:6px;
    padding:6px 15px;
    font-size:14px;
}
</style>

</head>

<!-- Navbar -->

<nav class="navbar navbar-expand-lg bg-white">

</ul>

<div class="d-flex align-items-center">
